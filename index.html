<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      color: #1f2937;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }

    h2 {
      margin: 0 0 30px;
      color: #1e3a8a;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      color: #374151;
      margin: 5px;
    }

    .app label {
      color: #6b7280;
    }

    #loginBox label {
      color: #374151;
      font-weight: 600;
    }

    input, select, textarea {
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #1e3a8a;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f8fafc;
      color: #334155;
    }

    .totales {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .total-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      font-weight: bold;
    }

    .warning {
      background: #fef3c7;
      color: #92400e;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      font-weight: bold;
    }

    .search-results {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      max-height: 220px;
      overflow-y: auto;
      margin-top: 4px;
      position: absolute;
      width: 100%;
      z-index: 20;
    }

    .search-item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #e5e7eb;
    }

    .search-item:hover {
      background: #eff6ff;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 16px;
    }

    .item-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #ffffff;
    }

    .item-title {
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .item-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .item-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .item-field label {
      font-size: 12px;
      color: #6b7280;
      margin: 0;
    }

    .item-field input {
      padding: 10px;
      font-size: 15px;
    }

    .item-subtotal {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f8fafc;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .item-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
    }

    .pending-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pending-info {
      font-size: 13px;
      color: #475569;
    }

    @media (max-width: 700px) {
      .item-grid,
      .totales {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div id="loginBox" class="card" style="max-width:400px; margin:60px auto; text-align:center;">
  <img src="./logo-acrylar-web.png" style="height:80px; margin-top:20px; margin-bottom:60px;">

  <h2 style="font-size:24px; margin-bottom:40px; text-align:left;">
    Ingreso
  </h2>

  <div style="text-align:left; margin-top:20px;">
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="loginUsuario">
    </div>

    <div class="field" style="margin-top:20px;">
      <label>Contraseña</label>
      <input type="password" id="loginPassword">
    </div>
  </div>

  <div style="margin-top:40px;">
    <button class="btn-primary" onclick="login()" style="width:100%; padding:16px; font-size:19px;">
      Ingresar
    </button>
  </div>

  <div id="loginError" style="color:red; margin-top:10px;"></div>
</div>

<div class="app" id="app" style="display:none;">

  <div class="card" style="padding:20px 28px;">
    <div style="position:relative; display:flex; align-items:center; justify-content:center;">
      <img src="./logo-acrylar-web.png" alt="Acryl-Ar" style="height:70px; object-fit:contain;">
      <button class="btn-secondary" onclick="logout()" style="position:absolute; top:0; right:0; padding:8px 16px; min-width:90px;">
        Salir
      </button>
    </div>
  </div>

  <div class="card" style="padding:20px 28px;">
    <div style="font-size:22px; font-weight:700; color:#0b4ea2;">
      Carga de pedidos
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="field">
        <label>Vendedor *</label>
        <select id="vendedor"></select>
      </div>
      <div class="field">
        <label>Cotización USD vigente</label>
        <input type="number" id="cotizacionUSD" step="0.01" readonly style="background:#f3f4f6; color:#374151; font-weight:700;">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Datos del cliente</h2>
    <div class="grid">
      <div class="field">
        <label>Nombre y apellido *</label>
        <input type="text" id="nombreApellido">
      </div>
      <div class="field">
        <label>Teléfono *</label>
        <input type="text" id="telefono">
      </div>
      <div class="field">
        <label>CUIT/CUIL *</label>
        <input type="text" id="dni">
      </div>
      <div class="field">
        <label>Mail *</label>
        <input type="email" id="mail">
      </div>
      <div class="field">
        <label>Dirección *</label>
        <input type="text" id="direccion">
      </div>
      <div class="field">
        <label>Localidad *</label>
        <input type="text" id="localidad">
      </div>
    </div>

    <div class="field" style="margin-top:12px;">
      <label>Observaciones</label>
      <textarea id="observaciones"></textarea>
    </div>
  </div>

  <div class="card">
    <h2>Productos</h2>

    <div class="grid">
      <div class="field" style="position:relative;">
        <label>Buscar producto</label>
        <input type="text" id="buscadorProducto" placeholder="Escribí para buscar...">
        <div id="resultadosBusqueda" class="search-results hidden"></div>
      </div>

      <div class="field">
        <label>Producto seleccionado</label>
        <input type="text" id="productoSeleccionado" readonly>
      </div>

      <div class="field">
        <label>Precio unitario ARS</label>
        <input type="number" id="precioUnitario" readonly>
      </div>

      <div class="field">
        <label>Cantidad</label>
        <input type="number" id="cantidad" min="1" step="1" value="1">
      </div>
    </div>

    <div style="margin-top:12px;">
      <button class="btn-primary" onclick="agregarItem()">Agregar producto</button>
    </div>

    <div id="listaItems" class="items-list"></div>
  </div>

  <div class="card">
    <h2>Pago</h2>

    <div class="field">
      <label>¿Pagó?</label>
      <select id="pagoRealizado" onchange="togglePagos()">
        <option value="NO">No</option>
        <option value="SI">Sí</option>
      </select>
    </div>

    <div id="bloquePagos" class="hidden" style="margin-top:12px;">
      <div class="grid">
        <div class="field">
          <label>Moneda</label>
          <select id="pagoMoneda">
            <option value="ARS">ARS</option>
            <option value="USD">USD</option>
          </select>
        </div>

        <div class="field">
          <label>Medio</label>
          <select id="pagoMedio"></select>
        </div>

        <div class="field">
          <label>Monto</label>
          <input type="number" id="pagoMonto" step="0.01">
        </div>
      </div>

      <div style="margin-top:12px;">
        <button class="btn-secondary" onclick="agregarPago()">Agregar pago</button>
      </div>

      <table id="tablaPagos">
        <thead>
          <tr>
            <th>Moneda</th>
            <th>Medio</th>
            <th>Monto</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>Resumen</h2>

    <div class="totales">
      <div class="total-box">
        <strong>Total pedido ARS</strong>
        <div id="totalPedidoARS">0.00</div>
      </div>
      <div class="total-box">
        <strong>Total pedido USD</strong>
        <div id="totalPedidoUSD">0.00</div>
      </div>
      <div class="total-box">
        <strong>Total pagado ARS</strong>
        <div id="totalPagadoARS">0.00</div>
      </div>
      <div class="total-box">
        <strong>Total pagado USD</strong>
        <div id="totalPagadoUSD">0.00</div>
      </div>
      <div class="total-box" id="boxSaldoARS">
        <strong>Saldo ARS</strong>
        <div id="saldoARS">0.00</div>
      </div>
      <div class="total-box" id="boxSaldoUSD">
        <strong>Saldo USD</strong>
        <div id="saldoUSD">0.00</div>
      </div>
    </div>

    <div style="margin-top:26px;">
      <button class="btn-primary" onclick="enviarPedido()">Enviar pedido</button>
    </div>

    <div class="pending-row">
      <button id="btnReenviarPendientes" class="btn-secondary" onclick="reenviarPedidosPendientes()">
        Forzar reenvío
      </button>
      <span id="pendientesInfo" class="pending-info"></span>
    </div>

    <div id="mensajeOk" class="success hidden"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://dvlrvpvazodadlteqlej.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_oWb1PZiQgxQmAFyV131I6Q_V2dKBvUR';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window.db = db;

  const PENDIENTES_KEY = 'pedidos_pendientes_expo_v1';

  let usuarioLogueado = null;
  let CONFIG = {};
  let PRODUCTOS = [];
  let ITEMS = [];
  let PAGOS = [];
  let productoActual = null;
  let isSaving = false;
  let isReenviandoPendientes = false;

  async function login() {
    const usuario = document.getElementById('loginUsuario').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!usuario || !password) {
      document.getElementById('loginError').innerText = 'Completá usuario y contraseña';
      return;
    }

    const { data, error } = await db.rpc('login_vendedor', {
      p_usuario: usuario,
      p_password: password
    });

    const resultado = Array.isArray(data) ? data[0] : data;

    if (error || !resultado || resultado.ok !== true) {
      document.getElementById('loginError').innerText = 'Usuario o contraseña incorrectos';
      return;
    }

    usuarioLogueado = {
      id: resultado.id || null,
      nombre: resultado.nombre,
      usuario: usuario
    };

    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('loginError').innerText = '';

    cargarVendedorLogueado();
    actualizarEstadoPendientes();
    reenviarPedidosPendientesAutomatico();
  }

  function logout() {
    usuarioLogueado = null;

    document.getElementById('app').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('loginError').innerText = '';
    document.getElementById('loginUsuario').value = '';
    document.getElementById('loginPassword').value = '';

    const vendedorSel = document.getElementById('vendedor');
    vendedorSel.disabled = false;
    vendedorSel.innerHTML = '<option value="">Seleccionar</option>';

    limpiarFormulario();
  }

  function cargarVendedorLogueado() {
    const vendedorSel = document.getElementById('vendedor');
    vendedorSel.innerHTML = `<option value="${escaparAttr(usuarioLogueado.nombre)}">${escaparHTML(usuarioLogueado.nombre)}</option>`;
    vendedorSel.value = usuarioLogueado.nombre;
    vendedorSel.disabled = true;
  }

  function formato(num) {
    return Number(num || 0).toLocaleString('es-AR', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function formatoARS(num) {
    return '$ ' + Number(num || 0).toLocaleString('es-AR', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function formatoUSD(num) {
    return 'USD ' + Number(num || 0).toLocaleString('es-AR', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function parseMontoARS(valor) {
    let s = String(valor ?? '')
      .trim()
      .replace(/\$/g, '')
      .replace(/\s/g, '');

    if (!s) return 0;

    if (s.includes(',')) {
      s = s.replace(/\./g, '').replace(',', '.');
    } else if (/^\d{1,3}(\.\d{3})+$/.test(s)) {
      s = s.replace(/\./g, '');
    }

    return Number(s) || 0;
  }

  function escaparHTML(valor) {
    return String(valor || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escaparAttr(valor) {
    return escaparHTML(valor).replace(/`/g, '&#096;');
  }

  function generarClientRequestId() {
    if (window.crypto && crypto.randomUUID) {
      return crypto.randomUUID();
    }
    return 'req_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  }

  async function init() {
    try {
      await cargarDatosIniciales();
      configurarEventosGlobales();
      actualizarEstadoPendientes();
      reenviarPedidosPendientesAutomatico();
    } catch (error) {
      console.error('Error al iniciar:', error);
      alert('No se pudo cargar la configuración inicial.');
    }
  }

  async function cargarDatosIniciales() {
    const { data: configApp, error: errorConfigApp } = await db
      .from('config_app')
      .select('cotizacion_usd')
      .eq('id', 1)
      .single();

    if (errorConfigApp) throw errorConfigApp;

    CONFIG = {
      cotizacionUSD: Number(configApp.cotizacion_usd) || 0,
      vendedores: [],
      mediosPago: ['Efectivo', 'Transferencia', 'Tarjeta']
    };

    let productos = [];
    let desde = 0;
    const bloque = 1000;

    while (true) {
      const { data, error } = await db
        .from('productos')
        .select('id,codigo,marca,producto,descripcion,precio_base,activo')
        .eq('activo', true)
        .order('producto', { ascending: true })
        .range(desde, desde + bloque - 1);

      if (error) throw error;

      productos = productos.concat(data || []);

      if (!data || data.length < bloque) {
        break;
      }

      desde += bloque;
    }

    PRODUCTOS = (productos || []).map(p => ({
      id: p.id,
      codigo: p.codigo || '',
      marca: p.marca || '',
      producto: p.producto || '',
      descripcion: p.descripcion || '',
      precioBase: Number(p.precio_base) || 0
    }));

    cargarConfig({
      cotizacionUSD: CONFIG.cotizacionUSD,
      vendedores: CONFIG.vendedores,
      mediosPago: CONFIG.mediosPago,
      productos: PRODUCTOS
    });
  }

  function cargarConfig(data) {
    CONFIG = data;
    PRODUCTOS = data.productos || [];

    const vendedorSel = document.getElementById('vendedor');
    vendedorSel.innerHTML = '<option value="">Iniciá sesión</option>';
    vendedorSel.disabled = true;

    const medioSel = document.getElementById('pagoMedio');
    medioSel.innerHTML = '';
    (data.mediosPago || []).forEach(m => {
      medioSel.innerHTML += `<option value="${escaparAttr(m)}">${escaparHTML(m)}</option>`;
    });

    document.getElementById('cotizacionUSD').value = data.cotizacionUSD || 0;
  }

  function configurarEventosGlobales() {
    document.getElementById('buscadorProducto').addEventListener('input', buscarProductos);
    document.getElementById('cotizacionUSD').addEventListener('input', renderResumen);

    document.addEventListener('click', (e) => {
      const buscador = document.getElementById('buscadorProducto');
      const resultados = document.getElementById('resultadosBusqueda');
      if (!buscador.contains(e.target) && !resultados.contains(e.target)) {
        resultados.classList.add('hidden');
      }
    });

    window.addEventListener('online', () => {
      reenviarPedidosPendientesAutomatico();
    });
  }

  function buscarProductos() {
    const texto = document.getElementById('buscadorProducto').value.toLowerCase().trim();
    const box = document.getElementById('resultadosBusqueda');

    if (!texto) {
      box.innerHTML = '';
      box.classList.add('hidden');
      return;
    }

    const encontrados = PRODUCTOS.filter(p =>
      String(p.producto).toLowerCase().includes(texto) ||
      String(p.marca).toLowerCase().includes(texto) ||
      String(p.descripcion).toLowerCase().includes(texto) ||
      String(p.codigo).toLowerCase().includes(texto)
    ).slice(0, 20);

    if (!encontrados.length) {
      box.innerHTML = '<div class="search-item">Sin resultados</div>';
      box.classList.remove('hidden');
      return;
    }

    box.innerHTML = encontrados.map((p) => `
      <div class="search-item" onclick="seleccionarProducto(${PRODUCTOS.indexOf(p)})">
        <strong>${escaparHTML(p.producto)}</strong>
        <div style="font-size:12px; color:#64748b; margin-top:4px;">
          Marca: ${escaparHTML(p.marca || '-')}
        </div>
        ${p.descripcion ? `
          <div style="font-size:12px; color:#64748b; margin-top:2px;">
            ${escaparHTML(p.descripcion)}
          </div>
        ` : ''}
      </div>
    `).join('');

    box.classList.remove('hidden');
  }

  function seleccionarProducto(index) {
    productoActual = PRODUCTOS[index];
    document.getElementById('productoSeleccionado').value = productoActual.producto;
    document.getElementById('precioUnitario').value = productoActual.precioBase;
    document.getElementById('buscadorProducto').value = productoActual.producto;
    document.getElementById('resultadosBusqueda').classList.add('hidden');
  }

  function agregarItem() {
    if (!productoActual) {
      alert('Seleccioná un producto.');
      return;
    }

    const cantidad = parseInt(document.getElementById('cantidad').value || 0, 10);
    const precio = Number(document.getElementById('precioUnitario').value || 0);

    if (cantidad <= 0) {
      alert('La cantidad debe ser mayor a 0.');
      return;
    }

    const nuevoItem = {
      producto: productoActual.producto,
      cantidad: cantidad,
      cantidadEntregada: 0,
      precioUnitario: precio,
      descuentoPorcentaje: 0,
      numeroSerie: '',
      subtotal: 0
    };

    recalcularItemObjeto(nuevoItem);
    ITEMS.push(nuevoItem);
    renderItems();

    productoActual = null;
    document.getElementById('buscadorProducto').value = '';
    document.getElementById('productoSeleccionado').value = '';
    document.getElementById('precioUnitario').value = '';
    document.getElementById('cantidad').value = 1;
    document.getElementById('resultadosBusqueda').classList.add('hidden');
  }

  function recalcularItemObjeto(item) {
    const cantidad = Number(item.cantidad) || 0;
    const precio = Number(item.precioUnitario) || 0;
    let descuento = Number(item.descuentoPorcentaje) || 0;

    if (descuento < 0) descuento = 0;
    if (descuento > 100) descuento = 100;

    item.descuentoPorcentaje = descuento;
    item.subtotal = cantidad * precio * (1 - descuento / 100);
  }

  function eliminarItem(i) {
    ITEMS.splice(i, 1);
    renderItems();
  }

  function renderItems() {
    const contenedor = document.getElementById('listaItems');
    contenedor.innerHTML = '';

    ITEMS.forEach((item, i) => {
      contenedor.innerHTML += `
        <div class="item-card">
          <div class="item-title">${escaparHTML(item.producto)}</div>

          <div class="item-grid">
            <div class="item-field">
              <label>Cantidad</label>
              <input type="number" min="1" step="1" value="${parseInt(item.cantidad || 0, 10)}" onchange="actualizarCantidadItem(${i}, this.value)">
            </div>

            <div class="item-field">
              <label>Entregado</label>
              <input type="number" min="0" max="${parseInt(item.cantidad || 0, 10)}" step="1" value="${parseInt(item.cantidadEntregada || 0, 10)}" onchange="actualizarCantidadEntregada(${i}, this.value)">
            </div>

            <div class="item-field">
              <label>Precio Unit. ARS</label>
              <input type="text" inputmode="decimal" value="${formato(item.precioUnitario)}" onfocus="this.value = Number(ITEMS[${i}].precioUnitario || 0)" onblur="actualizarPrecioUnitario(${i}, this.value)">
            </div>

            <div class="item-field">
              <label>Desc. %</label>
              <input type="number" min="0" max="100" step="0.01" value="${Number(item.descuentoPorcentaje || 0)}" onchange="actualizarDescuento(${i}, this.value)">
            </div>

            <div class="item-field" style="grid-column: 1 / -1;">
              <label>Color / Serie / Obs.</label>
              <input type="text" value="${escaparAttr(item.numeroSerie || '')}" onchange="actualizarNumeroSerie(${i}, this.value)" placeholder="Color, serie u observación">
            </div>
          </div>

          <div class="item-subtotal">
            <span>Subtotal</span>
            <span>${formatoARS(item.subtotal)}</span>
          </div>

          <div class="item-actions">
            <button class="btn-danger" onclick="eliminarItem(${i})">Quitar producto</button>
          </div>
        </div>
      `;
    });

    renderResumen();
  }

  function actualizarCantidadEntregada(index, valor) {
    const cantidadPedida = parseInt(ITEMS[index].cantidad || 0, 10);
    let entregada = parseInt(valor || 0, 10);

    if (isNaN(entregada)) entregada = 0;
    if (entregada < 0) entregada = 0;
    if (entregada > cantidadPedida) entregada = cantidadPedida;

    ITEMS[index].cantidadEntregada = entregada;
    renderItems();
  }

  function actualizarCantidadItem(index, valor) {
    let cantidad = parseInt(valor || 0, 10);

    if (isNaN(cantidad) || cantidad <= 0) cantidad = 1;

    ITEMS[index].cantidad = cantidad;

    if (parseInt(ITEMS[index].cantidadEntregada || 0, 10) > cantidad) {
      ITEMS[index].cantidadEntregada = cantidad;
    }

    recalcularItemObjeto(ITEMS[index]);
    renderItems();
  }

  function actualizarPrecioUnitario(index, valor) {
    let precio = parseMontoARS(valor);
    if (precio < 0) precio = 0;

    ITEMS[index].precioUnitario = precio;
    recalcularItemObjeto(ITEMS[index]);
    renderItems();
  }

  function actualizarDescuento(index, valor) {
    let descuento = Number(valor || 0);
    if (descuento < 0) descuento = 0;

    if (descuento > 100) {
      descuento = 100;
      alert('El descuento máximo permitido es 100%.');
    }

    ITEMS[index].descuentoPorcentaje = descuento;
    recalcularItemObjeto(ITEMS[index]);
    renderItems();
  }

  function actualizarNumeroSerie(index, valor) {
    ITEMS[index].numeroSerie = String(valor || '').trim();
  }

  function togglePagos() {
    const val = document.getElementById('pagoRealizado').value;
    const bloque = document.getElementById('bloquePagos');

    if (val === 'SI') {
      bloque.classList.remove('hidden');
    } else {
      bloque.classList.add('hidden');
      PAGOS = [];
      renderPagos();
    }

    renderResumen();
  }

  function agregarPago() {
    const moneda = document.getElementById('pagoMoneda').value;
    const medio = document.getElementById('pagoMedio').value;
    const monto = Number(document.getElementById('pagoMonto').value || 0);

    if (monto <= 0) {
      alert('Ingresá un monto válido.');
      return;
    }

    PAGOS.push({ moneda, medio, monto });
    renderPagos();
    document.getElementById('pagoMonto').value = '';
  }

  function renderPagos() {
    const tbody = document.querySelector('#tablaPagos tbody');
    tbody.innerHTML = '';

    PAGOS.forEach((p, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${escaparHTML(p.moneda)}</td>
          <td>${escaparHTML(p.medio)}</td>
          <td>${p.moneda === 'USD' ? formatoUSD(p.monto) : formatoARS(p.monto)}</td>
          <td><button class="btn-danger" onclick="eliminarPago(${i})">Quitar</button></td>
        </tr>
      `;
    });

    renderResumen();
  }

  function eliminarPago(i) {
    PAGOS.splice(i, 1);
    renderPagos();
  }

  function renderResumen() {
    const totalPedidoARS = ITEMS.reduce((acc, it) => acc + Number(it.subtotal || 0), 0);
    const cotizacion = Number(document.getElementById('cotizacionUSD').value || 0);
    const totalPedidoUSD = cotizacion > 0 ? totalPedidoARS / cotizacion : 0;

    const totalPagadoARSDirecto = PAGOS
      .filter(p => p.moneda === 'ARS')
      .reduce((acc, p) => acc + Number(p.monto || 0), 0);

    const totalPagadoUSD = PAGOS
      .filter(p => p.moneda === 'USD')
      .reduce((acc, p) => acc + Number(p.monto || 0), 0);

    const totalPagadoEquivARS = totalPagadoARSDirecto + (totalPagadoUSD * cotizacion);
    let saldoARS = totalPedidoARS - totalPagadoEquivARS;

    if (Math.abs(saldoARS) <= 1) {
      saldoARS = 0;
    }

    const saldoUSD = cotizacion > 0 ? saldoARS / cotizacion : 0;

    document.getElementById('totalPedidoARS').innerText = formatoARS(totalPedidoARS);
    document.getElementById('totalPedidoUSD').innerText = formatoUSD(totalPedidoUSD);
    document.getElementById('totalPagadoARS').innerText = formatoARS(totalPagadoEquivARS);
    document.getElementById('totalPagadoUSD').innerText = formatoUSD(totalPagadoUSD);

    const saldoARSEl = document.getElementById('saldoARS');
    const saldoUSDEl = document.getElementById('saldoUSD');

    saldoARSEl.innerText = formatoARS(saldoARS);
    saldoUSDEl.innerText = formatoUSD(saldoUSD);

    pintarSaldo('boxSaldoARS', saldoARSEl, saldoARS);
    pintarSaldo('boxSaldoUSD', saldoUSDEl, saldoUSD);
  }

  function pintarSaldo(boxId, elemento, valor) {
    const box = document.getElementById(boxId);
    elemento.style.fontWeight = '700';
    box.style.border = '1px solid transparent';

    if (Math.abs(valor) < 0.01) {
      elemento.style.color = '#15803d';
      box.style.background = '#dcfce7';
      box.style.border = '1px solid #86efac';
    } else if (valor > 0) {
      elemento.style.color = '#dc2626';
      box.style.background = '#fee2e2';
      box.style.border = '1px solid #fca5a5';
    } else {
      elemento.style.color = '#ea580c';
      box.style.background = '#ffedd5';
      box.style.border = '1px solid #fdba74';
    }
  }

  function construirPayloadPedido(clientRequestId) {
    const cotizacionUSD = Number(document.getElementById('cotizacionUSD').value || 0);
    const totalPedidoARS = ITEMS.reduce((acc, it) => acc + Number(it.subtotal || 0), 0);
    const totalPedidoUSD = cotizacionUSD > 0 ? totalPedidoARS / cotizacionUSD : 0;
    const pagoRealizado = document.getElementById('pagoRealizado').value === 'SI';

    return {
      clientRequestId: clientRequestId || generarClientRequestId(),
      vendedor: document.getElementById('vendedor').value.trim(),
      nombreApellido: document.getElementById('nombreApellido').value.trim(),
      mail: document.getElementById('mail').value.trim(),
      telefono: document.getElementById('telefono').value.trim(),
      dni: document.getElementById('dni').value.trim(),
      direccion: document.getElementById('direccion').value.trim(),
      localidad: document.getElementById('localidad').value.trim(),
      observaciones: document.getElementById('observaciones').value.trim(),
      cotizacionUSD,
      totalPedidoARS,
      totalPedidoUSD,
      pagoRealizado,
      estado: 'a facturar',
      items: ITEMS.map(item => ({
        producto: item.producto,
        cantidad: Number(item.cantidad) || 0,
        cantidad_entregada: Number(item.cantidadEntregada) || 0,
        precio_unitario: Number(item.precioUnitario) || 0,
        descuento_porcentaje: Number(item.descuentoPorcentaje) || 0,
        numero_serie: item.numeroSerie || '',
        subtotal: Number(item.subtotal) || 0
      })),
      pagos: PAGOS.map(p => ({
        moneda: p.moneda,
        medio: p.medio,
        monto: Number(p.monto) || 0
      }))
    };
  }

  async function enviarPedidoPayload(payload) {
    const { data, error } = await db.rpc('crear_pedido_completo', {
      p_client_request_id: payload.clientRequestId,
      p_vendedor: payload.vendedor,
      p_nombre_apellido: payload.nombreApellido,
      p_mail: payload.mail,
      p_telefono: payload.telefono,
      p_dni: payload.dni,
      p_direccion: payload.direccion,
      p_localidad: payload.localidad,
      p_observaciones: payload.observaciones,
      p_cotizacion_usd: payload.cotizacionUSD,
      p_total_pedido_ars: payload.totalPedidoARS,
      p_total_pedido_usd: payload.totalPedidoUSD,
      p_pago_realizado: payload.pagoRealizado,
      p_estado: payload.estado || 'a facturar',
      p_items: payload.items,
      p_pagos: payload.pagos
    });

    if (error) throw error;

    const pedidoInsertado = Array.isArray(data) ? data[0] : data;
    if (!pedidoInsertado || !pedidoInsertado.id) {
      throw new Error('Supabase no devolvió el ID del pedido.');
    }

    return {
      pedidoId: pedidoInsertado.id,
      fechaPedido: pedidoInsertado.creado_en
    };
  }

  async function enviarPedido() {
    const dni = document.getElementById('dni').value.trim();
    const nombreApellido = document.getElementById('nombreApellido').value.trim();
    const mail = document.getElementById('mail').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const direccion = document.getElementById('direccion').value.trim();
    const localidad = document.getElementById('localidad').value.trim();
    const vendedor = document.getElementById('vendedor').value.trim();

    if (!nombreApellido || !dni || !telefono || !mail || !direccion || !localidad || !vendedor) {
      alert('Completá los campos obligatorios: nombre, CUIT/CUIL, teléfono, mail, dirección, localidad y vendedor.');
      return;
    }

    if (!ITEMS.length) {
      alert('Agregá al menos un producto.');
      return;
    }

    const pagoRealizado = document.getElementById('pagoRealizado').value === 'SI';

    if (pagoRealizado && PAGOS.length === 0) {
      alert('Marcaste que el pedido está pago, pero no cargaste ningún pago.');
      return;
    }

    if (!confirm('¿Confirmar y enviar el pedido?')) {
      return;
    }

    if (isSaving) return;
    isSaving = true;

    const botonEnviar = document.querySelector('button[onclick="enviarPedido()"]');
    botonEnviar.disabled = true;
    botonEnviar.innerText = 'Guardando...';

    const payload = construirPayloadPedido();

    try {
      const resultado = await enviarPedidoPayload(payload);
      limpiarFormulario();

      const msg = document.getElementById('mensajeOk');
      msg.className = 'success';
      msg.innerText = `Pedido guardado correctamente. ID: ${resultado.pedidoId}. Se reflejará en caja automáticamente.`;
      msg.classList.remove('hidden');

    } catch (error) {
      console.error('Error al guardar:', error);
      guardarPedidoPendiente(payload, error.message || 'Error desconocido');

      const msg = document.getElementById('mensajeOk');
      msg.className = 'warning';
      msg.innerText = 'No se pudo enviar el pedido. Quedó guardado como pendiente en esta tablet. Se enviará automáticamente cuando vuelva la conexión.';
      msg.classList.remove('hidden');

      alert('No se pudo enviar el pedido. Quedó guardado como pendiente en esta tablet.');

      // Se limpia la pantalla para que el vendedor pueda cargar otro pedido
      limpiarFormulario();
    } finally {
      botonEnviar.disabled = false;
      botonEnviar.innerText = 'Enviar pedido';
      isSaving = false;
      actualizarEstadoPendientes();
    }
  }

  function obtenerPedidosPendientes() {
    try {
      const raw = localStorage.getItem(PENDIENTES_KEY);
      const datos = raw ? JSON.parse(raw) : [];
      return Array.isArray(datos) ? datos : [];
    } catch (error) {
      console.error('Error leyendo pendientes:', error);
      return [];
    }
  }

  function guardarPedidosPendientes(pendientes) {
    localStorage.setItem(PENDIENTES_KEY, JSON.stringify(pendientes));
    actualizarEstadoPendientes();
  }

  function guardarPedidoPendiente(payload, motivo) {
    const pendientes = obtenerPedidosPendientes();
    const yaExiste = pendientes.some(p => p.payload && p.payload.clientRequestId === payload.clientRequestId);

    if (!yaExiste) {
      pendientes.push({
        id: payload.clientRequestId,
        fecha: new Date().toISOString(),
        motivo: motivo || '',
        payload
      });
      guardarPedidosPendientes(pendientes);
    }
  }

  function actualizarEstadoPendientes() {
    const pendientes = obtenerPedidosPendientes();
    const info = document.getElementById('pendientesInfo');
    const btn = document.getElementById('btnReenviarPendientes');

    if (!info || !btn) return;

    if (pendientes.length === 0) {
      info.innerText = 'Sin pedidos pendientes.';
      btn.disabled = true;
    } else {
      info.innerText = `${pendientes.length} pedido(s) pendiente(s) en esta tablet.`;
      btn.disabled = false;
    }
  }

  async function reenviarPedidosPendientes() {
    const pendientes = obtenerPedidosPendientes();

    if (!pendientes.length) {
      alert('No hay pedidos pendientes para reenviar.');
      actualizarEstadoPendientes();
      return;
    }

    if (!confirm(`Hay ${pendientes.length} pedido(s) pendiente(s). ¿Reenviar ahora?`)) {
      return;
    }

    const btn = document.getElementById('btnReenviarPendientes');
    btn.disabled = true;
    btn.innerText = 'Reenviando...';

    const noEnviados = [];
    const detallesEnviados = [];
    let enviados = 0;

    for (const pendiente of pendientes) {
      try {
        const resultado = await enviarPedidoPayload(pendiente.payload);

        enviados++;

        if (resultado && resultado.pedidoId) {
          const cliente = pendiente.payload?.nombreApellido || 'Sin cliente';
          detallesEnviados.push(`${resultado.pedidoId} (${cliente})`);
        }

      } catch (error) {
        console.error('No se pudo reenviar pendiente:', pendiente, error);
        noEnviados.push({
          ...pendiente,
          motivo: error.message || 'Error desconocido'
        });
      }
    }

    guardarPedidosPendientes(noEnviados);

    btn.innerText = 'Forzar reenvío';
    actualizarEstadoPendientes();

    const msg = document.getElementById('mensajeOk');

    if (noEnviados.length === 0) {
      msg.className = 'success';
      msg.innerText = `Se reenviaron correctamente ${enviados} pedido(s) pendiente(s). ID: ${detallesEnviados.join(', ')}. Sin pedidos pendientes.`;
      msg.classList.remove('hidden');

      // Limpia la pantalla para cargar el próximo pedido
      limpiarFormulario();

      alert(`Se reenviaron ${enviados} pedido(s) pendiente(s). ID: ${detallesEnviados.join(', ')}`);

    } else {
      msg.className = 'warning';
      msg.innerText = `Se reenviaron ${enviados} pedido(s). ID: ${detallesEnviados.join(', ')}. Quedaron pendientes ${noEnviados.length}.`;
      msg.classList.remove('hidden');

      alert(`Se reenviaron ${enviados}. Quedaron pendientes ${noEnviados.length}.`);
    }
  }

  async function reenviarPedidosPendientesAutomatico() {
    if (isReenviandoPendientes) return;

    const pendientes = obtenerPedidosPendientes();

    if (!pendientes.length) {
      actualizarEstadoPendientes();
      return;
    }

    if (!navigator.onLine) {
      actualizarEstadoPendientes();
      return;
    }

    isReenviandoPendientes = true;

    const btn = document.getElementById('btnReenviarPendientes');
    if (btn) {
      btn.disabled = true;
      btn.innerText = 'Reenviando pendientes...';
    }

    const noEnviados = [];
    const detallesEnviados = [];
    let enviados = 0;

    for (const pendiente of pendientes) {
      try {
        const resultado = await enviarPedidoPayload(pendiente.payload);

        enviados++;

        if (resultado && resultado.pedidoId) {
          const cliente = pendiente.payload?.nombreApellido || 'Sin cliente';
          detallesEnviados.push(`${resultado.pedidoId} (${cliente})`);
        }

      } catch (error) {
        console.error('No se pudo reenviar pendiente automáticamente:', pendiente, error);

        noEnviados.push({
          ...pendiente,
          motivo: error.message || 'Error desconocido'
        });
      }
    }

    guardarPedidosPendientes(noEnviados);

    if (btn) {
      btn.innerText = 'Forzar reenvío';
    }

    actualizarEstadoPendientes();

    const msg = document.getElementById('mensajeOk');

    if (enviados > 0 && noEnviados.length === 0) {
      msg.className = 'success';
      msg.innerText = `Pedido pendiente enviado automáticamente. ID: ${detallesEnviados.join(', ')}. Sin pedidos pendientes.`;
      msg.classList.remove('hidden');
    }

    if (enviados > 0 && noEnviados.length > 0) {
      msg.className = 'warning';
      msg.innerText = `Se reenviaron automáticamente ${enviados} pedido(s). ID: ${detallesEnviados.join(', ')}. Quedaron pendientes ${noEnviados.length}.`;
      msg.classList.remove('hidden');
    }

    isReenviandoPendientes = false;
  }

  function limpiarFormulario() {
    document.getElementById('nombreApellido').value = '';
    document.getElementById('mail').value = '';
    document.getElementById('telefono').value = '';
    document.getElementById('dni').value = '';
    document.getElementById('direccion').value = '';
    document.getElementById('localidad').value = '';
    document.getElementById('observaciones').value = '';
    document.getElementById('buscadorProducto').value = '';
    document.getElementById('productoSeleccionado').value = '';
    document.getElementById('precioUnitario').value = '';
    document.getElementById('cantidad').value = 1;
    document.getElementById('pagoRealizado').value = 'NO';
    document.getElementById('bloquePagos').classList.add('hidden');
    document.getElementById('resultadosBusqueda').classList.add('hidden');

    ITEMS = [];
    PAGOS = [];
    productoActual = null;

    renderItems();
    renderPagos();
    renderResumen();
  }

  window.onload = init;
</script>

</body>
